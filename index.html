<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tracing - Huruf Aa - Apel</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #F5EDE0;
            --card: #FFFCF7;
            --fg: #3D2B1F;
            --muted: #9A8070;
            --accent: #C0392B;
            --green: #27AE60;
            --green-dark: #1E8449;
            --border: #E0D0BC;
            --guide: #D0C8BC;
            --pen: #2C3E50;
            --paper-dot: #DDD5C8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            padding: 16px;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(192,57,43,0.04) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(39,174,96,0.04) 0%, transparent 40%);
        }

        /* Halaman buku */
        .page {
            max-width: 840px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 12px;
            border: 2.5px solid var(--border);
            outline: 1.5px solid var(--border);
            outline-offset: 5px;
            box-shadow: 0 6px 40px rgba(61,43,31,0.1);
            padding: 32px 28px;
            position: relative;
            overflow: hidden;
        }

        /* Tekstur kertas titik-titik */
        .page::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, var(--paper-dot) 0.6px, transparent 0.6px);
            background-size: 18px 18px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }

        .page > * { position: relative; z-index: 1; }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .apple-wrap {
            display: inline-block;
            animation: floatApple 3.5s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(192,57,43,0.2));
        }

        @keyframes floatApple {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-7px) rotate(1.5deg); }
        }

        .apple-label {
            font-family: 'Patrick Hand', cursive;
            font-size: 30px;
            color: var(--accent);
            letter-spacing: 4px;
            margin-top: 2px;
        }

        .letter-title {
            font-family: 'Patrick Hand', cursive;
            font-size: 52px;
            font-weight: 700;
            color: var(--fg);
            line-height: 1;
            margin-top: 2px;
        }

        .letter-title .small {
            color: var(--muted);
            font-size: 40px;
        }

        .instruction {
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 14px;
            font-style: italic;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pen-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .pen-btn:hover { border-color: var(--muted); }
        .pen-btn.active { border-color: var(--accent); background: rgba(192,57,43,0.08); }

        .pen-btn .dot {
            border-radius: 50%;
            background: var(--pen);
        }

        .color-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { border-color: var(--fg); transform: scale(1.2); }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
        }

        /* Section */
        .section { margin-bottom: 20px; }

        .section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .section-title {
            font-family: 'Patrick Hand', cursive;
            font-size: 20px;
            color: var(--green-dark);
        }

        .section-title i { font-size: 15px; margin-right: 4px; }

        /* Demo urutan goresan */
        .demo-area {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .demo-area canvas {
            border: 2px dashed var(--border);
            border-radius: 8px;
            background: rgba(255,252,247,0.8);
        }

        /* Grid tracing */
        .trace-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            background: #EDE6DB;
            padding: 3px;
            border-radius: 8px;
            border: 2px solid var(--border);
        }

        .cell {
            aspect-ratio: 0.76;
            background: var(--card);
            border-radius: 4px;
            position: relative;
            cursor: crosshair;
            overflow: hidden;
            transition: box-shadow 0.25s;
        }

        .cell.traced {
            box-shadow: inset 0 0 0 2px rgba(39,174,96,0.25);
        }

        .cell canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            touch-action: none;
        }

        /* Divider */
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--border) 20%, var(--border) 80%, transparent 100%);
            margin: 22px 0;
        }

        /* Tombol aksi */
        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 9px 20px;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.2s ease;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
        .btn:active { transform: translateY(0); }

        .btn-red { background: var(--accent); color: #fff; }
        .btn-soft { background: var(--border); color: var(--fg); }
        .btn-green { background: var(--green); color: #fff; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--fg);
            color: #fff;
            padding: 10px 22px;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 700;
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Footer teks */
        .footer-text {
            text-align: center;
            margin-top: 18px;
            font-family: 'Patrick Hand', cursive;
            font-size: 16px;
            color: var(--muted);
            opacity: 0.7;
        }

        /* Responsif */
        @media (max-width: 680px) {
            .page { padding: 18px 12px; }
            .trace-grid {
                grid-template-columns: repeat(8, 58px);
                overflow-x: auto;
                justify-content: start;
                -webkit-overflow-scrolling: touch;
            }
            .letter-title { font-size: 40px; }
            .letter-title .small { font-size: 32px; }
            .apple-label { font-size: 24px; }
        }

        @media (max-width: 420px) {
            body { padding: 8px; }
            .toolbar { gap: 8px; }
        }

        /* Cetak */
        @media print {
            body { background: #fff; padding: 0; }
            .page {
                box-shadow: none;
                border-radius: 0;
                border: 1px solid #ccc;
                outline: none;
            }
            .page::after { display: none; }
            .toolbar, .actions, .toast, .footer-text { display: none !important; }
            .cell.traced { box-shadow: none; }
            .section { page-break-inside: avoid; }
        }

        /* Animasi masuk */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section { animation: fadeInUp 0.5s ease both; }
        .section:nth-child(2) { animation-delay: 0.1s; }

        @media (prefers-reduced-motion: reduce) {
            .apple-wrap { animation: none; }
            .section { animation: none; }
        }
    </style>
</head>
<body>

<script>
    /* ============================
       Konfigurasi global
    ============================ */
    let penSize = 3;
    let penColor = '#2C3E50';
    const DPR = window.devicePixelRatio || 1;

    /* ============================
       Utilitas gambar huruf panduan
    ============================ */

    // Menggambar huruf A besar (garis putus-putus)
    function drawGuideA(ctx, w, h) {
        ctx.clearRect(0, 0, w, h);
        ctx.setLineDash([5, 4]);
        ctx.strokeStyle = '#D0C8BC';
        ctx.lineWidth = Math.max(1.5, w * 0.04);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Kaki kiri: bawah-kiri → puncak
        ctx.beginPath();
        ctx.moveTo(w * 0.15, h * 0.88);
        ctx.lineTo(w * 0.50, h * 0.10);
        ctx.stroke();

        // Kaki kanan: puncak → bawah-kanan
        ctx.beginPath();
        ctx.moveTo(w * 0.50, h * 0.10);
        ctx.lineTo(w * 0.85, h * 0.88);
        ctx.stroke();

        // Garis melintang tengah
        ctx.beginPath();
        ctx.moveTo(w * 0.27, h * 0.55);
        ctx.lineTo(w * 0.73, h * 0.55);
        ctx.stroke();

        ctx.setLineDash([]);
    }

    // Menggambar huruf a kecil (garis putus-putus)
    function drawGuidea(ctx, w, h) {
        ctx.clearRect(0, 0, w, h);
        ctx.setLineDash([5, 4]);
        ctx.strokeStyle = '#D0C8BC';
        ctx.lineWidth = Math.max(1.5, w * 0.04);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Badan oval
        ctx.beginPath();
        ctx.ellipse(w * 0.44, h * 0.40, w * 0.21, h * 0.24, 0, 0, Math.PI * 2);
        ctx.stroke();

        // Batang vertikal kanan
        ctx.beginPath();
        ctx.moveTo(w * 0.65, h * 0.16);
        ctx.lineTo(w * 0.65, h * 0.88);
        ctx.stroke();

        ctx.setLineDash([]);
    }

    /* ============================
       Demo urutan goresan
    ============================ */

    function drawNumberBadge(ctx, x, y, num, color) {
        const r = Math.max(7, 7);
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(num), x, y + 0.5);
    }

    function drawArrowTip(ctx, toX, toY, angle, color) {
        const hl = 7;
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - hl * Math.cos(angle - 0.45), toY - hl * Math.sin(angle - 0.45));
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - hl * Math.cos(angle + 0.45), toY - hl * Math.sin(angle + 0.45));
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    function drawDemoA() {
        const canvas = document.getElementById('demoA');
        const dw = 100, dh = 118;
        canvas.style.width = dw + 'px';
        canvas.style.height = dh + 'px';
        canvas.width = dw * DPR;
        canvas.height = dh * DPR;
        const ctx = canvas.getContext('2d');
        ctx.scale(DPR, DPR);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const w = dw, h = dh;
        const strokes = [
            { color: '#E74C3C', from: [0.15, 0.88], to: [0.50, 0.10] },
            { color: '#2980B9', from: [0.50, 0.10], to: [0.85, 0.88] },
            { color: '#27AE60', from: [0.27, 0.55], to: [0.73, 0.55] }
        ];

        strokes.forEach((s, i) => {
            ctx.strokeStyle = s.color;
            ctx.lineWidth = 2.8;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(w * s.from[0], h * s.from[1]);
            ctx.lineTo(w * s.to[0], h * s.to[1]);
            ctx.stroke();

            // Panah di ujung
            const angle = Math.atan2(
                h * s.to[1] - h * s.from[1],
                w * s.to[0] - w * s.from[0]
            );
            drawArrowTip(ctx, w * s.to[0], w * s.to[1] !== undefined ? h * s.to[1] : 0, angle, s.color);

            // Nomor di awal goresan
            drawNumberBadge(ctx, w * s.from[0] - 10, h * s.from[1] + (i === 2 ? 10 : 0), i + 1, s.color);
        });
    }

    function drawDemoa() {
        const canvas = document.getElementById('demoa');
        const dw = 100, dh = 118;
        canvas.style.width = dw + 'px';
        canvas.style.height = dh + 'px';
        canvas.width = dw * DPR;
        canvas.height = dh * DPR;
        const ctx = canvas.getContext('2d');
        ctx.scale(DPR, DPR);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const w = dw, h = dh;

        // Goresan 1: Oval (merah) - gambar sebagai garis melingkar dengan panah
        ctx.strokeStyle = '#E74C3C';
        ctx.lineWidth = 2.8;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.ellipse(w * 0.44, h * 0.40, w * 0.21, h * 0.24, 0, 0, Math.PI * 2);
        ctx.stroke();
        // Panah di atas oval (arah searah jarum jam dari atas)
        drawArrowTip(ctx, w * 0.44, h * 0.16, -Math.PI / 2, '#E74C3C');
        drawNumberBadge(ctx, w * 0.44 - 22, h * 0.16, 1, '#E74C3C');

        // Goresan 2: Batang kanan (biru)
        ctx.strokeStyle = '#2980B9';
        ctx.lineWidth = 2.8;
        ctx.beginPath();
        ctx.moveTo(w * 0.65, h * 0.16);
        ctx.lineTo(w * 0.65, h * 0.88);
        ctx.stroke();
        drawArrowTip(ctx, w * 0.65, h * 0.88, Math.PI / 2, '#2980B9');
        drawNumberBadge(ctx, w * 0.65 + 14, h * 0.88, 2, '#2980B9');
    }

    /* ============================
       Inisialisasi sel tracing
    ============================ */

    function initCell(canvas, type) {
        const rect = canvas.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;

        if (w < 1 || h < 1) return; // Jangan init jika belum terlihat

        canvas.width = w * DPR;
        canvas.height = h * DPR;
        const ctx = canvas.getContext('2d');
        ctx.scale(DPR, DPR);

        // Gambar panduan
        if (type === 'A') {
            drawGuideA(ctx, w, h);
        } else {
            drawGuidea(ctx, w, h);
        }

        // State gambar pengguna
        let isDrawing = false;
        let lastPoint = null;
        let hasDrawn = false;

        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const clientX = e.clientX !== undefined ? e.clientX : (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY !== undefined ? e.clientY : (e.touches ? e.touches[0].clientY : 0);
            return { x: clientX - r.left, y: clientY - r.top };
        }

        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            lastPoint = getPos(e);
            if (!hasDrawn) {
                hasDrawn = true;
                canvas.parentElement.classList.add('traced');
            }
        }

        function moveDraw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);

            ctx.strokeStyle = penColor;
            ctx.lineWidth = penSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.setLineDash([]);

            ctx.beginPath();
            ctx.moveTo(lastPoint.x, lastPoint.y);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            lastPoint = pos;
        }

        function endDraw(e) {
            isDrawing = false;
            lastPoint = null;
        }

        // Gunakan pointer events (menangani mouse & touch)
        canvas.addEventListener('pointerdown', startDraw);
        canvas.addEventListener('pointermove', moveDraw);
        canvas.addEventListener('pointerup', endDraw);
        canvas.addEventListener('pointercancel', endDraw);
        canvas.addEventListener('pointerleave', endDraw);

        // Simpan fungsi hapus
        canvas._resetGuide = function () {
            ctx.clearRect(0, 0, w, h);
            if (type === 'A') {
                drawGuideA(ctx, w, h);
            } else {
                drawGuidea(ctx, w, h);
            }
            hasDrawn = false;
            canvas.parentElement.classList.remove('traced');
        };
    }

    /* ============================
       Membuat grid tracing
    ============================ */

    function createGrid(containerId, type, cols, rows) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        const canvases = [];

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.setAttribute('role', 'img');
                cell.setAttribute('aria-label', 'Trace huruf ' + type + ' baris ' + (r + 1) + ' kolom ' + (c + 1));

                const canvas = document.createElement('canvas');
                cell.appendChild(canvas);
                container.appendChild(cell);
                canvases.push(canvas);
            }
        }

        // Tunggu layout selesai, lalu init semua canvas
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                canvases.forEach(cvs => initCell(cvs, type));
            });
        });
    }

    /* ============================
       Fungsi hapus
    ============================ */

    function clearSection(gridId) {
        const container = document.getElementById(gridId);
        const canvases = container.querySelectorAll('canvas');
        let count = 0;
        canvases.forEach(cvs => {
            if (cvs._resetGuide) {
                cvs._resetGuide();
                count++;
            }
        });
        const label = gridId === 'gridA' ? 'A Besar' : 'a Kecil';
        showToast('Huruf ' + label + ' berhasil dihapus');
    }

    function clearAll() {
        clearSection('gridA');
        clearSection('grida');
    }

    /* ============================
       Toast notifikasi
    ============================ */

    let toastTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    /* ============================
       Toolbar: ketebalan & warna pena
    ============================ */

    // Tombol ketebalan
    document.querySelectorAll('.pen-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.pen-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            penSize = parseInt(btn.dataset.size, 10);
        });
    });

    // Tombol warna
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            penColor = btn.dataset.color;
        });
    });

    /* ============================
       Inisialisasi halaman
    ============================ */

    // Buat grid: 8 kolom × 3 baris
    createGrid('gridA', 'A', 8, 3);
    createGrid('grida', 'a', 8, 3);

    // Gambar demo urutan goresan
    drawDemoA();
    drawDemoa();

    // Handle resize: reinit semua canvas
    let resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            // Simpan state traced
            const gridA = document.getElementById('gridA');
            const grida = document.getElementById('grida');
            [gridA, grida].forEach(grid => {
                grid.querySelectorAll('.cell').forEach(cell => {
                    const wasTraced = cell.classList.contains('traced');
                    const cvs = cell.querySelector('canvas');
                    if (cvs) {
                        const type = grid.id === 'gridA' ? 'A' : 'a';
                        initCell(cvs, type);
                        if (wasTraced) cell.classList.add('traced');
                    }
                });
            });
            drawDemoA();
            drawDemoa();
        }, 300);
    });
</script>
</body>
</html>
